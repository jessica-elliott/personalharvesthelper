backend:
  name: github
  repo: jessica-elliott/personalharvesthelper
  branch: main
  base_url: https://personalharvesthelper.com
  auth_endpoint: /api/auth

publish_mode: editorial_workflow
media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home Page
        file: _content/home.md
        fields:
          - { label: Headline, name: headline, widget: string }
          - { label: Subheadline, name: subheadline, widget: text }
          - { label: Hero Image, name: hero_image, widget: image, required: false }
          - { label: Body Content, name: body, widget: markdown }
      - name: about
        label: About Page
        file: _content/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body Content, name: body, widget: markdown }
      - name: contact
        label: Contact Page
        file: _content/contact.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
      - name: waitlist
        label: Waitlist Page
        file: _content/waitlist.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }

  - name: posts
    label: Blog Posts
    folder: _posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Category, name: category, widget: select, options: ["beginner-gardening", "what-to-plant-this-month", "vegetable-guides", "herb-guides", "watering-help", "garden-problems", "raised-bed-gardening", "container-gardening"] }
      - { label: Featured Image, name: image, widget: image, required: false }
      - { label: Description, name: description, widget: text }
      - { label: Body, name: body, widget: markdown }